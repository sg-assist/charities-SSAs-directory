name: Verify Knowledge Base

on:
  # Run weekly on Mondays at 02:00 UTC
  schedule:
    - cron: '0 2 * * 1'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      stale_days:
        description: 'Staleness threshold in days'
        required: false
        default: '90'
  # Also run on pull requests that touch KB documents
  pull_request:
    paths:
      - 'docs/knowledge-base/directory/**.md'
      - 'next-app/scripts/verify-kb.ts'

permissions:
  contents: write
  issues: write

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: next-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: next-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run KB verification
        id: verify
        continue-on-error: true
        run: |
          STALE_DAYS="${{ github.event.inputs.stale_days || '90' }}"
          npx tsx scripts/verify-kb.ts --stale "$STALE_DAYS" || echo "VERIFICATION_FAILED=true" >> $GITHUB_OUTPUT

      - name: Upload verification report
        uses: actions/upload-artifact@v4
        with:
          name: verification-report
          path: docs/knowledge-base/directory/VERIFICATION-REPORT.md
          retention-days: 30

      - name: Commit verification report (if changed)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet docs/knowledge-base/directory/VERIFICATION-REPORT.md; then
            git add docs/knowledge-base/directory/VERIFICATION-REPORT.md
            git commit -m "chore: update KB verification report [skip ci]"
            git push
          else
            echo "No changes to verification report"
          fi

      - name: Create issue on verification failure
        if: steps.verify.outputs.VERIFICATION_FAILED == 'true' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('docs/knowledge-base/directory/VERIFICATION-REPORT.md', 'utf-8');
            const summary = report.split('## Per-document results')[0];

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `KB Verification Failed — ${new Date().toISOString().split('T')[0]}`,
              body: `The scheduled knowledge base verification run found errors.\n\n${summary}\n\nSee the full [verification report](../blob/main/docs/knowledge-base/directory/VERIFICATION-REPORT.md).`,
              labels: ['knowledge-base', 'verification']
            });
